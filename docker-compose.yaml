services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env

  frontend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
